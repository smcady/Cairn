<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" width="960" height="580" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 600; fill: #1A1A1A; letter-spacing: -0.02em; }
      .subtitle { font-size: 11px; fill: #909090; }
      .caption { font-size: 10.5px; fill: #909090; font-style: italic; }
      .panel-label { font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
      .panel-desc { font-size: 10px; font-style: italic; }
      .event-badge { font-size: 7.5px; font-weight: 600; letter-spacing: 0.08em; }
      .event-text { font-size: 10.5px; fill: #EEEEEE; }
      .event-meta { font-size: 8.5px; fill: #888888; }
      .g-status { font-size: 8px; font-weight: 600; letter-spacing: 0.08em; }
      .g-label { font-size: 11px; font-weight: 500; }
      .g-label-bold { font-size: 11px; font-weight: 700; }
      .g-sub { font-size: 9.5px; fill: #909090; }
      .g-edge-label { font-size: 8px; font-weight: 600; letter-spacing: 0.06em; fill: #555555; }
      .footer-note { font-size: 8.5px; fill: #888888; }
      .graph-footer { font-size: 8.5px; fill: #909090; }
      .conn-label { font-size: 8px; font-weight: 600; letter-spacing: 0.08em; fill: #B0B0B0; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="580" fill="#F8F8F8" rx="0"/>

  <!-- Title -->
  <text x="480" y="30" text-anchor="middle" class="title">The log is the truth. The graph is a view.</text>
  <text x="480" y="48" text-anchor="middle" class="subtitle">Two representations, one underlying record.</text>

  <!-- ══════════════════════════════════════ -->
  <!-- LEFT PANEL: Event Log                 -->
  <!-- ══════════════════════════════════════ -->
  <rect x="30" y="65" width="410" height="460" rx="8" fill="#2A2A2A" stroke="#383838" stroke-width="1"/>
  <!-- Accent bar -->
  <rect x="30" y="65" width="410" height="3" rx="1.5" fill="#555555"/>

  <!-- Panel header -->
  <text x="50" y="92" class="panel-label" fill="#808080">EVENT LOG</text>
  <text x="50" y="106" class="panel-desc" fill="#888888">append-only &#x00B7; ordered &#x00B7; immutable</text>

  <!-- Event 1: PROPOSITION -->
  <g transform="translate(50, 120)">
    <rect x="0" y="0" width="88" height="16" rx="3" fill="rgba(170,170,170,0.15)" stroke="#999999" stroke-width="0.8"/>
    <text x="44" y="11" text-anchor="middle" class="event-badge" fill="#AAAAAA">PROPOSITION</text>
    <text x="96" y="11" class="event-text">&#x201C;Usage-based pricing aligns incentives</text>
    <text x="96" y="25" class="event-text">and removes low-end friction&#x201D;</text>
    <text x="96" y="39" class="event-meta">Turn 2 &#x00B7; status: active</text>
    <line x1="0" y1="50" x2="370" y2="50" stroke="#383838" stroke-width="0.5"/>
  </g>

  <!-- Event 2: CONTRADICTION -->
  <g transform="translate(50, 178)">
    <rect x="0" y="0" width="102" height="16" rx="3" fill="rgba(150,150,150,0.15)" stroke="#999999" stroke-width="0.8"/>
    <text x="51" y="11" text-anchor="middle" class="event-badge" fill="#AAAAAA">CONTRADICTION</text>
    <text x="110" y="11" class="event-text">&#x201C;Enterprise procurement requires</text>
    <text x="110" y="25" class="event-text">predictable costs - usage-based is a blocker&#x201D;</text>
    <text x="110" y="39" class="event-meta">Turn 4 &#x00B7; contradicts Event 1 &#x00B7; Event 1 status: superseded</text>
    <line x1="0" y1="50" x2="370" y2="50" stroke="#383838" stroke-width="0.5"/>
  </g>

  <!-- Event 3: REFINEMENT -->
  <g transform="translate(50, 236)">
    <rect x="0" y="0" width="82" height="16" rx="3" fill="rgba(130,130,130,0.12)" stroke="#999999" stroke-width="0.8"/>
    <text x="41" y="11" text-anchor="middle" class="event-badge" fill="#AAAAAA">REFINEMENT</text>
    <text x="90" y="11" class="event-text">&#x201C;Two-track model: seat-based for enterprise,</text>
    <text x="90" y="25" class="event-text">usage-based for self-serve&#x201D;</text>
    <text x="90" y="39" class="event-meta">Turn 6 &#x00B7; resolves Events 1-2 &#x00B7; status: resolved</text>
    <line x1="0" y1="50" x2="370" y2="50" stroke="#383838" stroke-width="0.5"/>
  </g>

  <!-- Event 4: QUESTION -->
  <g transform="translate(50, 294)">
    <rect x="0" y="0" width="70" height="16" rx="3" fill="rgba(130,130,130,0.12)" stroke="#999999" stroke-width="0.8"/>
    <text x="35" y="11" text-anchor="middle" class="event-badge" fill="#AAAAAA">QUESTION</text>
    <text x="78" y="11" class="event-text">&#x201C;Freemium strategy - deferred for</text>
    <text x="78" y="25" class="event-text">separate discussion&#x201D;</text>
    <text x="78" y="39" class="event-meta">Turn 7 &#x00B7; status: parked</text>
    <line x1="0" y1="50" x2="370" y2="50" stroke="#383838" stroke-width="0.5"/>
  </g>

  <!-- Event 5: SYNTHESIS -->
  <g transform="translate(50, 352)">
    <rect x="0" y="0" width="74" height="16" rx="3" fill="rgba(140,140,140,0.12)" stroke="#999999" stroke-width="0.8"/>
    <text x="37" y="11" text-anchor="middle" class="event-badge" fill="#AAAAAA">SYNTHESIS</text>
    <text x="82" y="11" class="event-text">&#x201C;Pricing should track how value is realized,</text>
    <text x="82" y="25" class="event-text">not just procurement constraints&#x201D;</text>
    <text x="82" y="39" class="event-meta">Turn 8 &#x00B7; synthesizes Events 1, 3 &#x00B7; status: active</text>
  </g>

  <!-- Hash note footer -->
  <line x1="50" y1="405" x2="420" y2="405" stroke="#383838" stroke-width="0.5"/>
  <text x="50" y="422" class="footer-note" font-weight="700" fill="#888888">#</text>
  <text x="62" y="422" class="footer-note">Each event carries a hash of its predecessor -</text>
  <text x="62" y="435" class="footer-note">the chain is tamper-evident by structure</text>

  <!-- ══════════════════════════════════════ -->
  <!-- CONNECTOR                              -->
  <!-- ══════════════════════════════════════ -->
  <rect x="440" y="65" width="72" height="460" fill="#F8F8F8" stroke="#D8D8D8" stroke-width="1" stroke-dasharray="0"/>
  <!-- top/bottom borders only -->
  <line x1="440" y1="65" x2="512" y2="65" stroke="#D8D8D8" stroke-width="1"/>
  <line x1="440" y1="525" x2="512" y2="525" stroke="#D8D8D8" stroke-width="1"/>

  <text x="476" y="275" text-anchor="middle" class="conn-label">REPLAY</text>
  <circle cx="476" cy="295" r="18" fill="#FFFFFF" stroke="#D8D8D8" stroke-width="1"/>
  <text x="476" y="299" text-anchor="middle" font-size="14" fill="#909090">&#x2192;</text>
  <text x="476" y="325" text-anchor="middle" class="conn-label">PROJECT</text>

  <!-- ══════════════════════════════════════ -->
  <!-- RIGHT PANEL: Reasoning Graph           -->
  <!-- ══════════════════════════════════════ -->
  <rect x="512" y="65" width="418" height="460" rx="8" fill="#FFFFFF" stroke="#D8D8D8" stroke-width="1"/>
  <!-- Accent bar -->
  <rect x="512" y="65" width="418" height="3" rx="1.5" fill="#555555"/>

  <!-- Panel header -->
  <text x="535" y="92" class="panel-label" fill="#555555">REASONING GRAPH</text>
  <text x="535" y="106" class="panel-desc" fill="#909090">current state of thinking</text>

  <!-- Node 1: Superseded -->
  <rect x="535" y="118" width="374" height="42" rx="6" fill="#F3F3F3" stroke="#C0C0C0" stroke-width="1"/>
  <text x="548" y="135" class="g-status" fill="#C0C0C0">SUPERSEDED</text>
  <text x="548" y="151" class="g-label" fill="#999999" text-decoration="line-through">Usage-based pricing</text>

  <!-- Edge: Resolved by -->
  <line x1="560" y1="160" x2="560" y2="192" stroke="#555555" stroke-width="1.5"/>
  <text x="572" y="180" class="g-edge-label">RESOLVED BY</text>
  <!-- Arrow tip -->
  <polygon points="557,192 563,192 560,197" fill="#555555"/>

  <!-- Node 2: Settled -->
  <rect x="535" y="200" width="374" height="56" rx="6" fill="#F0F0F0" stroke="#555555" stroke-width="2"/>
  <text x="548" y="218" class="g-status" fill="#555555">SETTLED</text>
  <text x="548" y="234" class="g-label-bold" fill="#333333">Two-track model</text>
  <text x="548" y="248" class="g-sub">seat-based enterprise &#x00B7; usage-based self-serve</text>

  <!-- Separator -->

  <!-- Node 3: Open -->
  <rect x="535" y="272" width="374" height="52" rx="6" fill="#F8F8F8" stroke="#909090" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="548" y="290" class="g-status" fill="#909090">? OPEN</text>
  <text x="548" y="306" class="g-label" fill="#777777">Freemium strategy</text>
  <text x="548" y="318" class="g-sub">separate discussion needed</text>

  <!-- Separator -->

  <!-- Node 4: Synthesis -->
  <rect x="535" y="340" width="374" height="56" rx="6" fill="#F0F0F0" stroke="#777777" stroke-width="1.5"/>
  <text x="548" y="358" class="g-status" fill="#777777">SYNTHESIS</text>
  <text x="548" y="374" class="g-label" fill="#555555">Value-realization pricing principle</text>
  <text x="548" y="388" class="g-sub">emerges from Events 1 + 3</text>

  <!-- Graph footer note -->
  <line x1="535" y1="415" x2="909" y2="415" stroke="#D8D8D8" stroke-width="0.5"/>
  <text x="535" y="433" class="graph-footer" fill="#555555" font-size="11">&#x21BA;</text>
  <text x="550" y="433" class="graph-footer">New events extend the log and update the graph.</text>
  <text x="550" y="446" class="graph-footer">The log never changes - only grows.</text>

  <!-- ══════════════════════════════════════ -->
  <!-- CAPTION                                -->
  <!-- ══════════════════════════════════════ -->
  <text x="480" y="555" text-anchor="middle" class="caption">The log answers: how did we get here? The graph answers: where are we now?</text>

</svg>