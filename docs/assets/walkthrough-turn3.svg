<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" font-family="Inter, -apple-system, sans-serif">
  <style>
    .node-box { rx: 8; ry: 8; stroke-width: 1.5; }
    .prop-box { fill: #FAFAFA; stroke: #888; }
    .q-box { fill: #FAFAFA; stroke: #999; stroke-dasharray: 5,3; }
    .ev-box { fill: #F0F0F0; stroke: #AAA; stroke-width: 1; }
    .obj-box { fill: #F0F0F0; stroke: #666; stroke-width: 1; }
    .tension-box { fill: #F0F0F0; stroke: #777; stroke-width: 1.5; }
    .type-label { font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; fill: #888; }
    .type-label-dark { font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; fill: #666; }
    .node-text { font-size: 12px; font-weight: 500; fill: #333; }
    .ev-text { font-size: 11px; font-weight: 500; fill: #666; }
    .meta-text { font-size: 10px; fill: #999; }
    .conf-text { font-size: 10px; font-weight: 600; fill: #555; }
    .edge-line { stroke-width: 1.5; fill: none; }
    .edge-support { stroke: #888; }
    .edge-contra { stroke: #555; }
    .edge-between { stroke: #999; stroke-dasharray: 4,3; }
    .edge-label { font-size: 9px; font-weight: 600; letter-spacing: 0.05em; }
    .edge-label-support { fill: #888; }
    .edge-label-contra { fill: #555; }
    .arrow-support { fill: #888; }
    .arrow-contra { fill: #555; }
  </style>

  <!-- LEFT SIDE -->

  <!-- Proposition node -->
  <rect class="node-box prop-box" x="20" y="20" width="280" height="80" />
  <text class="type-label" x="36" y="42">Proposition</text>
  <text class="node-text" x="36" y="60">Usage-based pricing aligns</text>
  <text class="node-text" x="36" y="75">revenue with customer value</text>
  <text class="conf-text" x="36" y="92">confidence: 0.64 &#x2192; 0.53</text>

  <!-- Supports edge -->
  <line class="edge-line edge-support" x1="80" y1="100" x2="80" y2="130" />
  <polygon class="arrow-support" points="75,128 80,138 85,128" />
  <text class="edge-label edge-label-support" x="92" y="122">SUPPORTS (0.70)</text>

  <!-- Evidence node -->
  <rect class="node-box ev-box" x="20" y="140" width="280" height="45" />
  <text class="type-label" x="36" y="158">Evidence</text>
  <text class="ev-text" x="36" y="174">40% revenue increase at prior company</text>

  <!-- Contradicts edge -->
  <line class="edge-line edge-contra" x1="150" y1="100" x2="150" y2="210" />
  <polygon class="arrow-contra" points="145,208 150,218 155,208" />
  <text class="edge-label edge-label-contra" x="162" y="204">CONTRADICTS (0.55)</text>

  <!-- Objection node -->
  <rect class="node-box obj-box" x="20" y="220" width="280" height="55" />
  <text class="type-label-dark" x="36" y="240">Objection</text>
  <text class="ev-text" x="36" y="258">Enterprise prospect: unpredictable</text>
  <text class="ev-text" x="36" y="271">costs are a dealbreaker</text>

  <!-- RIGHT SIDE -->

  <!-- Question node -->
  <rect class="node-box q-box" x="370" y="20" width="290" height="70" />
  <text class="type-label" x="386" y="42">? Question</text>
  <text class="node-text" x="386" y="60">How to handle customers with</text>
  <text class="node-text" x="386" y="75">low or unpredictable usage</text>

  <!-- Enterprise proposition -->
  <rect class="node-box prop-box" x="370" y="140" width="290" height="65" />
  <text class="type-label" x="386" y="160">Proposition</text>
  <text class="node-text" x="386" y="178">Enterprise customers require</text>
  <text class="node-text" x="386" y="193">predictable pricing</text>

  <!-- Tension node -->
  <rect class="node-box tension-box" x="370" y="245" width="290" height="50" />
  <text class="type-label-dark" x="386" y="265">Tension</text>
  <text class="ev-text" x="386" y="282">Usage alignment vs. enterprise predictability</text>

  <!-- Tension dashed connectors -->
  <line class="edge-line edge-between" x1="300" y1="60" x2="370" y2="270" />
  <line class="edge-line edge-between" x1="515" y1="205" x2="515" y2="245" />

  <!-- Stats bar -->
  <text class="meta-text" x="20" y="330">6 nodes</text>
  <text class="meta-text" x="100" y="330">4 edges</text>
  <text class="meta-text" x="180" y="330">1 live tension</text>
  <text class="meta-text" x="20" y="348">confidence dropped: evidence (0.70) vs. objection (0.55) now in balance</text>
</svg>
