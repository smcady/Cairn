<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="Inter, system-ui, sans-serif">

  <!-- Background -->
  <rect width="1200" height="480" fill="#111111" rx="0"/>

  <!-- X-axis (what was said) -->
  <line x1="160" y1="340" x2="750" y2="340" stroke="#555" stroke-width="2"/>
  <polygon points="750,334 750,346 764,340" fill="#555"/>

  <!-- Y-axis (what it means) -->
  <line x1="160" y1="340" x2="160" y2="80" stroke="#E8E8E8" stroke-width="2.5"/>
  <polygon points="154,80 166,80 160,66" fill="#E8E8E8"/>

  <!-- X-axis label -->
  <text x="470" y="380" text-anchor="middle" font-size="16" font-weight="500" fill="#666" letter-spacing="0.5px">what was said</text>
  <text x="470" y="400" text-anchor="middle" font-size="12" fill="#444">retrieval memory</text>

  <!-- Y-axis label -->
  <text x="100" y="200" text-anchor="middle" font-size="16" font-weight="500" fill="#E8E8E8" letter-spacing="0.5px" transform="rotate(-90 100 200)">what it means now</text>
  <text x="60" y="200" text-anchor="middle" font-size="12" fill="#888" transform="rotate(-90 60 200)">reasoning memory</text>

  <!-- Dots along x-axis (flat retrieval) -->
  <circle cx="250" cy="340" r="6" fill="#555"/>
  <circle cx="320" cy="340" r="6" fill="#555"/>
  <circle cx="400" cy="340" r="6" fill="#555"/>
  <circle cx="460" cy="340" r="6" fill="#555"/>
  <circle cx="540" cy="340" r="6" fill="#555"/>
  <circle cx="610" cy="340" r="6" fill="#555"/>
  <circle cx="680" cy="340" r="6" fill="#555"/>

  <!-- Label for flat dots -->
  <text x="465" y="326" text-anchor="middle" font-size="11" fill="#666" font-style="italic">every chunk looks the same</text>

  <!-- Dots in 2D space (reasoning memory) -->
  <circle cx="280" cy="260" r="7" fill="#E8E8E8" opacity="0.9"/>
  <circle cx="380" cy="160" r="8" fill="#FFFFFF"/>
  <circle cx="500" cy="120" r="9" fill="#FFFFFF"/>
  <circle cx="440" cy="220" r="6" fill="#E8E8E8" opacity="0.7"/>
  <circle cx="580" cy="180" r="7" fill="#E8E8E8" opacity="0.8"/>
  <circle cx="340" cy="290" r="5" fill="#999" opacity="0.5"/>
  <circle cx="620" cy="240" r="6" fill="#E8E8E8" opacity="0.7"/>

  <!-- Connecting lines between 2D dots (relationships) -->
  <line x1="280" y1="260" x2="380" y2="160" stroke="#E8E8E8" stroke-width="1" opacity="0.3"/>
  <line x1="380" y1="160" x2="500" y2="120" stroke="#E8E8E8" stroke-width="1" opacity="0.3"/>
  <line x1="440" y1="220" x2="500" y2="120" stroke="#E8E8E8" stroke-width="1" opacity="0.3"/>
  <line x1="500" y1="120" x2="580" y2="180" stroke="#E8E8E8" stroke-width="1" opacity="0.3"/>
  <line x1="580" y1="180" x2="620" y2="240" stroke="#E8E8E8" stroke-width="1" opacity="0.3"/>
  <line x1="340" y1="290" x2="280" y2="260" stroke="#999" stroke-width="1" opacity="0.2"/>

  <!-- Right side text (vertically centered) -->
  <text x="850" y="148" font-size="28" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5px">AI memory</text>
  <text x="850" y="180" font-size="28" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5px">has a missing</text>
  <text x="850" y="212" font-size="28" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5px">dimension.</text>

  <text x="850" y="250" font-size="15" fill="#888" letter-spacing="0.2px">It remembers what you said.</text>
  <text x="850" y="272" font-size="15" fill="#888" letter-spacing="0.2px">Not what you decided, or why.</text>

  <text x="850" y="312" font-size="14" fill="#666" letter-spacing="0.3px">Retrieval finds matching text.</text>
  <text x="850" y="334" font-size="14" fill="#666" letter-spacing="0.3px">Reasoning tracks what happened to it.</text>

  <!-- Subtle bottom branding area -->
  <text x="850" y="420" font-size="13" font-weight="600" fill="#555" letter-spacing="0.5px">cairn</text>
  <text x="850" y="438" font-size="11" fill="#444">reasoning memory for AI agents</text>

</svg>
